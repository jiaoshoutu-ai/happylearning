<!DOCTYPE html>
<html lang="zh-CN" data-theme="cyber">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>思辨能力雷达图 · 六边形战士</title>
<link rel="stylesheet" href="theme.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(ellipse at 50% 30%, var(--bg-mid) 0%, var(--bg-deep) 70%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font);
    overflow-x: hidden;
  }

  body.theme-ambient::after {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 500px; height: 500px;
    background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: ambientPulse 4s ease-in-out infinite;
  }

  @keyframes ambientPulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
  }

  .container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    z-index: 1;
  }

  .title {
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-strong) 40%, var(--gold) 70%, var(--gold-strong) 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s ease-in-out infinite;
    margin-bottom: 6px;
    text-align: center;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.95rem;
    letter-spacing: 0.15em;
    margin-bottom: 20px;
    opacity: 0.8;
  }

  .motivation {
    color: var(--gold);
    font-size: 1.05rem;
    font-weight: 600;
    min-height: 32px;
    line-height: 32px;
    margin-bottom: 8px;
    text-align: center;
    transition: all 0.4s ease;
    text-shadow: 0 0 20px var(--gold-glow);
  }

  .motivation.pop {
    animation: popIn 0.5s var(--ease-bounce);
  }

  @keyframes popIn {
    0% { opacity: 0; transform: translateY(12px) scale(0.9); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .chart-wrapper {
    position: relative;
    width: 560px;
    max-width: 95vw;
    aspect-ratio: 1;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }

  .train-btn {
    margin-top: 24px;
    padding: 14px 40px;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    font-family: var(--font);
    color: var(--bg-deep);
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-strong) 100%);
    border: none;
    border-radius: var(--radius-full);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all var(--duration-normal) ease;
    box-shadow: var(--shadow-gold);
  }

  .train-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 36px var(--gold-glow);
  }

  .train-btn:active {
    transform: translateY(0);
    box-shadow: 0 2px 12px var(--gold-glow);
  }

  .train-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: 0 2px 8px var(--gold-glow);
  }

  .train-btn::after {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 60%);
    opacity: 0;
    transition: opacity var(--duration-normal);
  }

  .train-btn:hover::after { opacity: 1; }
  .train-btn span { position: relative; z-index: 1; }

  /* Theme switcher */
  .theme-switcher {
    display: flex; gap: 8px; margin-bottom: 16px;
  }
  .theme-dot {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }
  .theme-dot:hover { transform: scale(1.15); }
  .theme-dot.active { border-color: var(--text); box-shadow: 0 0 10px var(--accent-glow); }
  .theme-dot.cyber { background: #42A5F5; }
  .theme-dot.forest { background: #66BB6A; }
  .theme-dot.sunset { background: #FF7043; }

  @media (max-width: 600px) {
    .title { font-size: 1.6rem; }
    .subtitle { font-size: 0.8rem; }
    .train-btn { padding: 12px 30px; font-size: 1rem; }
    .chart-wrapper { width: 95vw; }
  }
</style>
</head>
<body class="theme-ambient">

<div class="container">
  <h1 class="title" id="title">思辨能力雷达图</h1>
  <p class="subtitle" id="subtitle">⚔️ 六边形战士成长日记</p>

  <!-- Theme switcher -->
  <div class="theme-switcher">
    <span class="theme-dot cyber active" data-theme="cyber" title="赛博终端"></span>
    <span class="theme-dot forest" data-theme="forest" title="霓虹森林"></span>
    <span class="theme-dot sunset" data-theme="sunset" title="日落竞技"></span>
  </div>

  <div class="motivation" id="motivation">✨ 点击下方按钮，开始你的修炼之旅</div>
  <div class="chart-wrapper">
    <canvas id="radar"></canvas>
  </div>
  <button class="train-btn" id="trainBtn">
    <span>⚔️ 模拟修炼一节课</span>
  </button>
</div>

<script src="radar-chart.js"></script>
<script src="theme.js"></script>
<script>
(function() {
  var canvas = document.getElementById('radar');
  var motivationEl = document.getElementById('motivation');
  var trainBtn = document.getElementById('trainBtn');

  // ── Theme switcher ──
  document.querySelectorAll('.theme-dot').forEach(function(dot) {
    dot.addEventListener('click', function() {
      var name = dot.dataset.theme;
      themeManager.apply(name);
      document.querySelectorAll('.theme-dot').forEach(function(d) { d.classList.remove('active'); });
      dot.classList.add('active');
    });
  });

  // ── 1. 加载配置 ──
  function loadConfig() {
    return HexagonRadar.loadConfig('radar-chart-config.json').catch(function() {
      return {
        dimensions: [
          { id: 'logic',       label: '逻辑力', value: 40, color: '#4FC3F7', description: '论证是否因果清晰' },
          { id: 'empathy',     label: '共情力', value: 70, color: '#81C784', description: '能否站在对方立场说出理由' },
          { id: 'evidence',    label: '证据力', value: 55, color: '#FFB74D', description: '引用视频细节的次数' },
          { id: 'foresight',   label: '远见力', value: 30, color: '#CE93D8', description: '提出"长期影响"类观点的频率' },
          { id: 'resilience',  label: '抗挫力', value: 85, color: '#F06292', description: '被AI反驳后重新组织语言的次数' },
          { id: 'perspective', label: '换位力', value: 60, color: '#4DD0E1', description: '完成"强制换位"任务的总数' },
        ],
        previousValues: [35, 65, 50, 25, 80, 55],
        title: '思辨能力雷达图',
        subtitle: '⚔️ 六边形战士成长日记',
      };
    });
  }

  loadConfig().then(function(opts) {
    if (opts.title) document.getElementById('title').textContent = opts.title;
    if (opts.subtitle) document.getElementById('subtitle').textContent = opts.subtitle;

    var radar = new HexagonRadar(canvas, opts);

    // ── Theme sync: update canvas colors when theme changes ──
    window.addEventListener('themeChanged', function(e) {
      requestAnimationFrame(function() {
        radar.setTheme(themeManager.getRadarTheme());
      });
    });

    radar.opts.callbacks.onDimensionClick = function(dim, value) {
      motivationEl.textContent = '📖 ' + dim.label + '（' + value + '分）：' + dim.description;
      motivationEl.classList.remove('pop');
      void motivationEl.offsetWidth;
      motivationEl.classList.add('pop');
    };

    radar.bindTrainButton(trainBtn, motivationEl);

    var saved = localStorage.getItem(radar.opts.storageKey);
    if (saved) {
      motivationEl.textContent = '✨ 欢迎回来！继续修炼吧';
      motivationEl.classList.add('pop');
    } else {
      radar.startInitialAnimation();
    }
  });
})();
</script>
</body>
</html>
